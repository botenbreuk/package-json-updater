<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Package body -->
  <rect x="88" y="278" width="336" height="170" rx="16" fill="white"/>

  <!-- Package lid (slightly wider than body) -->
  <rect x="72" y="242" width="368" height="54" rx="12" fill="white"/>

  <!-- Centre ribbon (like a tape seal on the box) -->
  <rect x="214" y="242" width="84" height="206" rx="8" fill="#93c5fd"/>

  <!-- Arrow shaft -->
  <rect x="238" y="76" width="36" height="166" rx="18" fill="white"/>

  <!-- Arrow head -->
  <polygon points="256,40 360,168 152,168" fill="white"/>
</svg>
